name: Generate RSS feed

on:
  push:
    branches: [main]
    paths:
      - "posts.js"
      - "generate_rss.js"
      - ".github/workflows/rss.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rss-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate rss.xml
        run: node generate_rss.js

      - name: Commit updated feed
        run: |
          if git diff --quiet -- rss.xml; then
            echo "rss.xml unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rss.xml
          git commit -m "chore: regenerate rss.xml [skip ci]"
          git push

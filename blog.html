<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rLLM Project — Blog</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/x-icon" href="images/rllm_logo/icon.png">
</head>
<body>

  <!-- ========== HEADER / NAVBAR ========== -->
  <header>
    <div class="logo">
      <a href="index.html" class="logo-container">
        <img src="images/rllm_logo/rllm_logo_light.png" alt="rLLM Logo" class="logo-img" id="logo" />
      </a>
    </div>
    <nav class="nav-bar">
      <ul class="nav-links">
        <li><a href="index.html" class="nav-btn">Home</a></li>
        <li><a href="blog.html" class="nav-btn active">Blog</a></li>
        <li><a href="team.html" class="nav-btn">Team</a></li>
      </ul>
      <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle theme">
        <span class="toggle-icon">☾</span>
        <span class="toggle-label">Light Mode</span>
      </button>
    </nav>
  </header>

  <!-- ========== BLOG HERO ========== -->
  <section class="blog-hero">
    <h1>Blog</h1>
    <p>Research, releases, and updates from the rLLM Project — building the infrastructure to train, evaluate, and evolve intelligent agents.</p>
  </section>

  <!-- ========== FEATURED ========== -->
  <section class="featured" id="featured"></section>

  <!-- ========== LATEST GRID ========== -->
  <div class="section-head">
    <h2>Latest</h2>
  </div>
  <section class="post-grid" id="posts-grid"></section>

  <!-- ========== FOOTER ========== -->
  <footer>
    <p>© 2026 rLLM Project</p>
  </footer>

  <script src="posts.js"></script>
  <script>
    renderPosts({
      featuredEl: document.getElementById('featured'),
      gridEl: document.getElementById('posts-grid'),
      withFeatured: true,
    });
  </script>
  <script src="theme.js"></script>
</body>
</html>

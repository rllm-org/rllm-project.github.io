<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rLLM Project — Blog</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/x-icon" href="images/rllm_logo/icon.png">
  <link rel="alternate" type="application/rss+xml" title="rLLM Project — Blog" href="rss.xml">
</head>
<body>

  <!-- ========== HEADER / NAVBAR ========== -->
  <header>
    <div class="logo">
      <a href="index.html" class="logo-container">
        <img src="images/rllm_logo/rllm_logo_light.png" alt="rLLM Logo" class="logo-img" id="logo" />
      </a>
    </div>
    <nav class="nav-bar">
      <ul class="nav-links">
        <li><a href="index.html" class="nav-btn">Home</a></li>
        <li><a href="blog.html" class="nav-btn active">Blog</a></li>
        <li><a href="team.html" class="nav-btn">Team</a></li>
      </ul>
      <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle theme">
        <span class="toggle-icon">☾</span>
        <span class="toggle-label">Light Mode</span>
      </button>
    </nav>
  </header>

  <!-- ========== BLOG HERO ========== -->
  <section class="blog-hero">
    <h1>Blog</h1>
    <p>Research, releases, and updates from the rLLM Project — building the infrastructure to train, evaluate, and evolve intelligent agents.</p>
    <a class="rss-link" href="rss.xml">
      <svg class="rss-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="currentColor">
        <circle cx="6.18" cy="17.82" r="2.18"/>
        <path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83C19.56 11.4 12.6 4.44 4 4.44z"/>
        <path d="M4 10.1v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83c0-5.47-4.43-9.9-9.9-9.9z"/>
      </svg>
      Subscribe via RSS
    </a>
  </section>

  <!-- ========== FEATURED ========== -->
  <section class="featured" id="featured"></section>

  <!-- ========== LATEST GRID ========== -->
  <div class="section-head">
    <h2>Latest</h2>
  </div>
  <section class="post-grid" id="posts-grid"></section>

  <!-- ========== FOOTER ========== -->
  <footer>
    <p>© 2026 rLLM Project</p>
  </footer>

  <script src="posts.js"></script>
  <script>
    renderPosts({
      featuredEl: document.getElementById('featured'),
      gridEl: document.getElementById('posts-grid'),
      withFeatured: true,
    });
  </script>
  <script src="theme.js"></script>
</body>
</html>

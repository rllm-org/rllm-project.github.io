<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rLLM Project</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/x-icon" href="images/rllm_logo/favicon.ico">
  <link rel="alternate" type="application/rss+xml" title="rLLM Project — Blog" href="rss.xml">
</head>
<body>

  <!-- ========== HEADER / NAVBAR ========== -->
  <header>
    <div class="logo">
      <a href="index.html" class="logo-container">
        <img src="images/rllm_logo/rllm_logo_light.png" alt="rLLM Logo" class="logo-img" id="logo">
      </a>
    </div>
    <nav class="nav-bar">
      <ul class="nav-links">
        <li><a href="index.html" class="nav-btn active">Home</a></li>
        <li><a href="blog.html" class="nav-btn">Blog</a></li>
        <li><a href="team.html" class="nav-btn">Team</a></li>
      </ul>
      <a class="rss-nav-btn" href="rss.xml" aria-label="Subscribe via RSS" title="Subscribe via RSS">
        <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true" fill="currentColor">
          <circle cx="6.18" cy="17.82" r="2.18"/>
          <path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83C19.56 11.4 12.6 4.44 4 4.44z"/>
          <path d="M4 10.1v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83c0-5.47-4.43-9.9-9.9-9.9z"/>
        </svg>
      </a>
      <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle theme">
        <span class="toggle-icon">☾</span>
        <span class="toggle-label">Light Mode</span>
      </button>
    </nav>
  </header>

  <!-- ========== HERO / INTRO SECTION ========== -->
  <section class="hero">
    <div class="hero-text">
      <span class="hero-eyebrow">Berkeley Sky Computing Lab</span>
      <h2>Training the next generation of intelligent agents.</h2>
      <p class="main-paragraph">
        rLLM is an open-source initiative building the infrastructure to train, evaluate, and evolve intelligent agents at scale.
      </p>
      <div class="social-icons">
        <a href="mailto:sijuntan@berkeley.edu">
          <img id="email-icon" src="images/contact_icons/email_light.png" alt="Email" class="social-icon">
        </a>
        <a href="https://github.com/rllm-org/rllm">
          <img id="github-icon" src="images/contact_icons/github_light.png" alt="GitHub" class="social-icon">
        </a>
        <a href="https://x.com/rllm_project">
          <img id="x-icon" src="images/contact_icons/x_light.png" alt="Twitter" class="social-icon x-logo">
        </a>
      </div>
    </div>
  </section>

  <!-- ========== LATEST POSTS ========== -->
  <div class="section-head">
    <h2>Latest</h2>
    <a href="blog.html" class="section-link">View all posts →</a>
  </div>
  <section class="post-grid" id="posts-grid"></section>

  <!-- ========== FOOTER ========== -->
  <footer>
    <p>© 2026 rLLM Project</p>
  </footer>

  <script src="posts.js"></script>
  <script>
    renderPosts({
      gridEl: document.getElementById('posts-grid'),
      limit: 6,
    });
  </script>
  <script src="theme.js"></script>
</body>
</html>
